name: Test

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci --ignore-engines

      - name: Type check
        run: npx tsc --build

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
