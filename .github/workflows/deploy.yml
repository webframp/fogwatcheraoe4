name: Deploy

on:
  release:
    types: [published]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci --ignore-engines

      - name: Type check
        run: npx tsc --build

      - name: Run tests
        run: npm test

      - name: Configure Devvit auth
        run: |
          mkdir -p ~/.devvit
          echo '${{ secrets.DEVVIT_TOKEN }}' > ~/.devvit/token

      - name: Deploy to Reddit
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npx devvit upload --version "$VERSION"
